experiment:
  name: random_survival_forest
  seed: 42
  output_dir: experiments

dataset:
  data_dir: data/training_data
  channel_table_path: channel_table.csv

features:
  demographics: true
  engineered_psg: true
  raw_signal: false

split:
  mode: holdout
  test_size: 0.2
  val_size: 0.1

model:
  name: random_survival_forest
  params:
    n_estimators: 200
    min_samples_split: 10
    random_state: 42

evaluation:
  num_time_points: 5
